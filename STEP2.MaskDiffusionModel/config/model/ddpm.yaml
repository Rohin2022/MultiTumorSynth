# Have to be derived from VQ-GAN Latent space dimensions
diffusion_img_size: 32
diffusion_depth_size: 32
diffusion_num_channels: 4
out_dim: 8
dim_mults: [1,2,4,8]
results_folder: checkpoints/
results_folder_postfix: 'mask_diffusion_train_pro'
load_milestone: False

batch_size: 4 # 40
num_workers: 16
logger: wandb
objective: pred_x0
save_and_sample_every: 500
denoising_fn: Unet3D
train_lr: 1e-4
timesteps: 1000 # number of steps
sampling_timesteps: 1000 # number of sampling timesteps (using ddim for faster inference [see citation for ddim paper])
loss_type: l1 # L1 or L2
train_num_steps: 4000 # total training steps
gradient_accumulate_every: 2 # gradient accumulation steps
ema_decay: 0.995 # exponential moving average decay
amp: True # turn on mixed precision
num_sample_rows: 1
gpus: 0
