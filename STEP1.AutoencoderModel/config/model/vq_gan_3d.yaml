seed: 1234
num_workers: 16

gpus: 4
accumulate_grad_batches: 1
default_root_dir: checkpoints/vq_gan/
default_root_dir_postfix: 'abdomen_atlas_140k_v7'
resume: True
resume_version: 2
resume_from_checkpoint: ~
pretrained_checkpoint: ~
max_steps: 300000 # MUST BE DOUBLED -> lightning global step is doubled because of two optimizer.step calls
max_epochs: -1
precision: bf16-mixed
gradient_clip_val: 1.0

embedding_dim: 8
n_codes: 8192
n_hiddens: 32
lr: 3e-4
downsample: [4, 4, 4]
disc_channels: 64
disc_layers: 3
discriminator_iter_start: 20000 # MUST BE DOUBLED -> lightning global step is doubled because of two optimizer.step calls
disc_loss_type: hinge
image_gan_weight: 1.0
video_gan_weight: 1.0
l1_weight: 4.0
gan_feat_weight: 4.0
perceptual_weight: 4.0 
i3d_feat: False
restart_thres: 0.05
no_random_restart: False
norm_type: group
padding_type: replicate
num_groups: 32
